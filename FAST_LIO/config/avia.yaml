common:
    lid_topic:  "/livox/lidar"
    imu_topic:  "/livox/imu"
    time_sync_en: false         # ONLY turn on when external time synchronization is really not possible
    time_offset_lidar_to_imu: 0.0 # Time offset between lidar and IMU calibrated by other algorithms, e.g. LI-Init (can be found in README).
                                  # This param will take effect no matter what time_sync_en is. So if the time offset is not known exactly, please set as 0.0

preprocess:
    lidar_type: 1                # 1 for Livox serials LiDAR, 2 for Velodyne LiDAR, 3 for ouster LiDAR, 
    scan_line: 6
    blind: 4

mapping:
    acc_cov: 0.1
    gyr_cov: 0.1
    b_acc_cov: 0.0001
    b_gyr_cov: 0.0001
    fov_degree:    90
    det_range:     450.0
    extrinsic_est_en:  false      # true: enable the online estimation of IMU-LiDAR extrinsic
    extrinsic_T: [ 0.04165, 0.02326, -0.0284 ]
    extrinsic_R: [ 1, 0, 0,
                   0, 1, 0,
                   0, 0, 1]
    primitive_mode: 3
    primitive_neighbor_count: 5
    primitive_min_valid_neighbors: 5
    primitive_max_match_sq: 5.0
    primitive_plane_fit_threshold: 0.1
    primitive_acceptance_score_threshold: 0.9
    primitive_lp_shape_p: 4.0
    primitive_lp_tangent_weight: 0.2
    primitive_lp_tangent_scale: 1.0
    primitive_lp_normal_scale: 1.0
    primitive_min_eigenvalue: 0.0001
    primitive_min_normal_scale: 0.05
    primitive_min_tangent_scale: 0.10
    primitive_hybrid_neighbor_count: 8
    primitive_hybrid_min_valid_neighbors: 6
    primitive_hybrid_min_planarity: 0.85
    primitive_hybrid_min_tangent_ratio: 0.10
    primitive_hybrid_weight_min: 0.50
    primitive_hybrid_weight_max: 1.00
    primitive_log_enable: false
    primitive_log_stride: 1
    primitive_log_csv_path: ""
    local_refinement_hook_enable: false
    local_refinement_recent_keyframe_limit: 10
    local_refinement_window_size: 5
    local_refinement_translation_step_size: 0.1

publish:
    path_en:  false
    scan_publish_en:  true       # false: close all the point cloud output
    dense_publish_en: true       # false: low down the points number in a global-frame point clouds scan.
    scan_bodyframe_pub_en: true  # true: output the point cloud scans in IMU-body-frame

pcd_save:
    pcd_save_en: true
    interval: -1                 # how many LiDAR frames saved in each pcd file; 
                                 # -1 : all frames will be saved in ONE pcd file, may lead to memory crash when having too much frames.
